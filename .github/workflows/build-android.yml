name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with APK'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive --no-install

      - name: Build debug APK
        working-directory: android
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Gold Trading Alerts v${{ github.run_number }}
          body: |
            ## Gold Trading Alerts — Android Debug Build

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Features
            - Real-time XAU/USD price monitoring via Finnhub API
            - Telegram bot notifications when price touches levels
            - Local push notifications
            - Background price monitoring (~15 min interval)
            - 4 screens: Dashboard, Levels, Alerts, Settings

            > This is a debug build for testing purposes.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
